version: 2

models:
  - name: sales
    description: "Gold layer fact table containing sales order line items."
    config:
      materialized: table
      location_root: abfss://gold@medallionsa01.dfs.core.windows.net/marts/

    columns:
      - name: SalesOrderID
        description: "Sales order header identifier."
        tests:
          - not_null

      - name: SalesOrderDetailID
        description: "Unique identifier for each line item in the order."
        tests:
          - unique
          - not_null

      - name: CustomerID
        description: "Foreign key to customer dimension."

      - name: ProductID
        description: "Foreign key to product dimension."

      - name: OrderDate
        description: "Date when the order was placed."

      - name: LineTotal
        description: "Total amount for the line item (after discount)."

      - name: TotalDue
        description: "Total amount due for the entire order."

      - name: gold_loaded_at
        description: "Timestamp when the record was loaded into the Gold layer."